xero:
  target: dev
  outputs:
    smoke:
      type: postgres
      host: localhost
      port: 5433
      dbname: xero_smoke
      user: xero
      password: xero_smoke_pw
      schema: public
      threads: 4
    dev:
      type: postgres
      host: "{{ env_var('RDS_PG_HOST') }}"
      port: "{{ env_var('RDS_PG_PORT', '5432') | int }}"
      dbname: "{{ env_var('RDS_PG_DATABASE') }}"
      user: "{{ env_var('RDS_PG_USER') }}"
      password: "{{ env_var('RDS_PG_PASSWORD') }}"
      schema: public
      threads: 4
