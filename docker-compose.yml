services:
  metabase:
    image: metabase/metabase:latest
    container_name: xero-metabase
    ports:
      - "3001:3000"       # Dagster is on 3000; Metabase on 3001
    environment:
      JAVA_TIMEZONE: Australia/Sydney
      # Metabase internal state — H2 is fine for a small team.
      # To upgrade to Postgres later, swap MB_DB_TYPE to postgres
      # and add MB_DB_HOST / MB_DB_PORT / MB_DB_DBNAME / MB_DB_USER / MB_DB_PASS.
      MB_DB_TYPE: h2
      MB_DB_FILE: /metabase-data/metabase.db
    volumes:
      - metabase-data:/metabase-data
    restart: unless-stopped

volumes:
  metabase-data:
