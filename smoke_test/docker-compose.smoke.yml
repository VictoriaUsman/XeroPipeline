services:
  postgres:
    image: postgres:15
    container_name: xero-smoke-pg
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: xero_smoke
      POSTGRES_USER: xero
      POSTGRES_PASSWORD: xero_smoke_pw
    volumes:
      - smoke-pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U xero -d xero_smoke"]
      interval: 5s
      timeout: 5s
      retries: 15

  metabase:
    image: metabase/metabase:latest
    container_name: xero-smoke-metabase
    ports:
      - "3001:3000"
    environment:
      MB_DB_TYPE: h2
      MB_DB_FILE: /metabase-data/metabase.db
      JAVA_TIMEZONE: Australia/Sydney
    volumes:
      - smoke-mb-data:/metabase-data
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  smoke-pg-data:
  smoke-mb-data:
